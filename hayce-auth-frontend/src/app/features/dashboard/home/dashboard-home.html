<div class="mx-auto w-full max-w-5xl px-4 sm:px-6 lg:px-8 py-6 space-y-6">

  <!-- CELEBRACION -->
  @if (roleCelebration(); as celebration) {
    <section class="flex flex-col gap-4 rounded-3xl border border-blue-200 bg-gradient-to-b from-blue-50 to-white p-4 shadow-sm sm:flex-row sm:items-start sm:justify-between sm:p-5">
      <div class="min-w-0">
        <span class="inline-flex rounded-full bg-blue-100 px-3 py-1 text-[0.68rem] font-semibold uppercase tracking-[0.14em] text-blue-700">
          Nueva actualización
        </span>
        <h2 class="mt-3 text-xl font-semibold tracking-tight text-slate-900 sm:text-2xl">
          {{ celebration.title }}
        </h2>
        <p class="mt-2 max-w-2xl text-sm leading-6 text-slate-600 sm:text-base">
          {{ celebration.body }}
        </p>
      </div>

      <button
        type="button"
        class="inline-flex h-10 w-10 items-center justify-center self-end rounded-2xl border border-blue-200 bg-white text-slate-500 hover:bg-slate-50"
        (click)="dismissRoleCelebration()"
      >
        <i class="icon text-lg">close</i>
      </button>
    </section>
  }

  <!-- HEADER -->
  <section class="flex flex-col gap-2">

    <p class="text-sm text-slate-500">
      {{ getGreeting() }}, {{ currentUser()?.nombre }}
    </p>

    <h1 class="text-3xl sm:text-4xl font-semibold text-slate-900">
      ¿Empezemos?
    </h1>

    <p class="text-sm sm:text-base text-slate-500 max-w-md">
      Accede rápidamente a las funciones principales del sistema.
    </p>

  </section>

  <!-- ACTIONS -->
  <div class="
    flex flex-wrap gap-3
    sm:grid sm:grid-cols-2
    lg:grid-cols-3
  ">

    <button
      *ngFor="let action of quickActions"
      (click)="goTo(action.route)"
      class="
        group inline-flex items-center gap-3
        w-auto sm:w-full
        rounded-full sm:rounded-xl
        border border-slate-200 bg-white
        px-4 py-2 sm:px-4 sm:py-4
        transition hover:border-slate-300 hover:shadow-sm
      "
    >

      <div
        class="flex items-center justify-center h-8 w-8 sm:h-12 sm:w-12 rounded-full sm:rounded-lg shrink-0"
        [ngClass]="{
          'bg-blue-50 text-blue-600': action.colorClass === 'blue',
          'bg-green-50 text-green-600': action.colorClass === 'green',
          'bg-orange-50 text-orange-600': action.colorClass === 'orange',
          'bg-violet-50 text-violet-600': action.colorClass === 'purple',
          'bg-red-50 text-red-600': action.colorClass === 'red',
          'bg-slate-100 text-slate-600': action.colorClass === 'gray'
        }"
      >
        <i class="icon text-base sm:text-xl">{{ action.icon }}</i>
      </div>

      <span class="text-sm sm:text-base font-medium text-slate-900 whitespace-nowrap">
        {{ action.label }}
      </span>

      <i class="icon hidden sm:inline-flex ml-auto text-slate-300">
        chevron_right
      </i>

    </button>

  </div>

</div>
