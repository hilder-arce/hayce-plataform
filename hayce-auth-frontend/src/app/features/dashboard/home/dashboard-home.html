<div class="mx-auto w-full max-w-5xl space-y-6 px-4 py-6 sm:px-6 lg:px-8">

  <!-- CELEBRACION -->
  @if (roleCelebration(); as celebration) {
    <section class="flex flex-col gap-4 rounded-3xl border border-blue-200 bg-gradient-to-b from-blue-50 to-white p-4 shadow-sm sm:flex-row sm:items-start sm:justify-between sm:p-5">
      <div class="min-w-0">
        <span class="inline-flex rounded-full bg-blue-100 px-3 py-1 text-[0.68rem] font-semibold uppercase tracking-[0.14em] text-blue-700">
          Nueva actualización
        </span>
        <h2 class="mt-3 text-xl font-semibold tracking-tight text-slate-900 sm:text-2xl">
          {{ celebration.title }}
        </h2>
        <p class="mt-2 max-w-2xl text-sm leading-6 text-slate-600 sm:text-base">
          {{ celebration.body }}
        </p>
      </div>

      <button
        type="button"
        class="inline-flex h-10 w-10 items-center justify-center self-end rounded-2xl border border-blue-200 bg-white text-slate-500 hover:bg-slate-50"
        (click)="dismissRoleCelebration()"
      >
        <i class="icon text-lg">close</i>
      </button>
    </section>
  }

  <!-- HEADER -->
  <section class="flex flex-col gap-1 py-2 sm:gap-1.5">
    <div class="inline-flex items-center gap-2 text-[1.15rem] font-normal leading-none text-slate-800 sm:text-[1.22rem]">
      <svg
        class="h-9 w-9 shrink-0 sm:h-10 sm:w-10"
        viewBox="0 0 24 24"
        fill="none"
        aria-hidden="true"
      >
        <path
          d="M12 2.5c.8 4.1 1.9 5.2 6 6-4.1.8-5.2 1.9-6 6-.8-4.1-1.9-5.2-6-6 4.1-.8 5.2-1.9 6-6Z"
          fill="url(#homeSparkleGradient)"
        />
        <path
          d="M17.6 11.8c.3 1.5.7 1.9 2.2 2.2-1.5.3-1.9.7-2.2 2.2-.3-1.5-.7-1.9-2.2-2.2 1.5-.3 1.9-.7 2.2-2.2Z"
          fill="#5B8CFF"
        />
        <defs>
          <linearGradient id="homeSparkleGradient" x1="5.5" y1="4" x2="18.5" y2="18.5" gradientUnits="userSpaceOnUse">
            <stop stop-color="#46C2FF" />
            <stop offset="0.35" stop-color="#7A5CFF" />
            <stop offset="0.7" stop-color="#FF6FAE" />
            <stop offset="1" stop-color="#FFB347" />
          </linearGradient>
        </defs>
      </svg>

      <p class="inline-flex flex-wrap items-baseline gap-x-1.5">
        <span>Hola,</span>
        <span>{{ currentUser()?.nombre }}</span>
      </p>
    </div>

    <h1 class="max-w-3xl text-[2.35rem] font-normal leading-[1.02] tracking-[-0.04em] text-slate-900 sm:text-[2.8rem]">
      ¿Empezémos?
    </h1>

    <p class="max-w-2xl text-sm leading-6 text-slate-500 sm:text-[0.98rem]">
      Accede rápidamente a las funciones principales del sistema.
    </p>
  </section>

  <!-- ACTIONS -->
  <div class="
    flex flex-wrap gap-3
    sm:grid sm:grid-cols-2
    lg:grid-cols-3
  ">

    <button
      *ngFor="let action of quickActions"
      (click)="goTo(action.route)"
      class="
        group inline-flex items-center gap-3
        w-auto sm:w-full
        rounded-full sm:rounded-xl
        border border-slate-200 bg-white
        px-4 py-2 sm:px-4 sm:py-4
        transition hover:border-slate-300 hover:shadow-sm
      "
    >

      <div
        class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full sm:h-12 sm:w-12 sm:rounded-lg"
        [ngClass]="{
          'bg-blue-50 text-blue-600': action.colorClass === 'blue',
          'bg-green-50 text-green-600': action.colorClass === 'green',
          'bg-orange-50 text-orange-600': action.colorClass === 'orange',
          'bg-violet-50 text-violet-600': action.colorClass === 'purple',
          'bg-red-50 text-red-600': action.colorClass === 'red',
          'bg-slate-100 text-slate-600': action.colorClass === 'gray'
        }"
      >
        <i class="icon text-base sm:text-xl">{{ action.icon }}</i>
      </div>

      <span class="whitespace-nowrap text-sm font-medium text-slate-900 sm:text-base">
        {{ action.label }}
      </span>

      <i class="icon ml-auto hidden text-slate-300 sm:inline-flex">
        chevron_right
      </i>

    </button>

  </div>

</div>
