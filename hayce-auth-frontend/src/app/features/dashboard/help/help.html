<div class="mx-auto grid w-full max-w-7xl gap-6">
  <!-- ================================================ -->
  <!-- [ HERO ] - PRESENTACION DEL CENTRO DE AYUDA      -->
  <!-- ================================================ -->
  <section class="grid gap-4 xl:grid-cols-[minmax(0,1.35fr)_minmax(18rem,0.95fr)]">
    <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
      <span class="inline-flex rounded-full bg-blue-50 px-3 py-1 text-[0.68rem] font-semibold uppercase tracking-[0.14em] text-blue-700">
        Centro de ayuda
      </span>
      <h1 class="mt-4 text-3xl font-semibold tracking-tight text-slate-900 sm:text-4xl">
        Ayuda operativa para el rol {{ roleLabel() }}.
      </h1>
      <p class="mt-3 max-w-2xl text-sm leading-6 text-slate-500 sm:text-base">
        Consulta solo las guías y accesos que corresponden a tu cargo actual para operar el sistema con claridad.
      </p>
    </div>

    <div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-sm sm:p-5">
      <span class="inline-flex rounded-full bg-blue-50 px-3 py-1 text-[0.68rem] font-semibold uppercase tracking-[0.14em] text-blue-700">
        Acceso rápido
      </span>

      <div class="mt-4 grid gap-3">
        <button
          *ngFor="let link of quickLinks()"
          type="button"
          class="flex items-center gap-3 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-left text-sm font-medium text-slate-700 transition hover:border-blue-200 hover:bg-white hover:text-slate-900 hover:shadow-sm"
          (click)="navigate(link.route)"
        >
          <span class="inline-flex h-10 w-10 items-center justify-center rounded-2xl bg-blue-50 text-blue-700">
            <i class="icon text-lg">{{ link.icon }}</i>
          </span>
          <span>{{ link.label }}</span>
        </button>
      </div>
    </div>
  </section>

  <!-- ================================================ -->
  <!-- [ SECCIONES ] - AYUDA SEGUN EL ROL               -->
  <!-- ================================================ -->
  <section class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
    <article
      *ngFor="let section of sections()"
      class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm"
    >
      <div class="grid grid-cols-[auto_1fr] gap-4">
        <div class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-blue-50 text-blue-700">
          <i class="icon text-[1.35rem]">{{ section.icon }}</i>
        </div>

        <div class="min-w-0">
          <h2 class="text-lg font-semibold text-slate-900">{{ section.title }}</h2>
          <p class="mt-2 text-sm leading-6 text-slate-500">{{ section.description }}</p>
        </div>
      </div>

      <ul class="mt-5 grid gap-3 text-sm leading-6 text-slate-600">
        <li
          *ngFor="let bullet of section.bullets"
          class="flex gap-3"
        >
          <span class="mt-2 h-2 w-2 shrink-0 rounded-full bg-blue-500"></span>
          <span>{{ bullet }}</span>
        </li>
      </ul>
    </article>
  </section>
</div>
